name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/353129188949/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@hexa-cold-calling.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          IMAGE=us-central1-docker.pkg.dev/hexa-cold-calling/hexa-cold-calling/backend:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=us-central1-docker.pkg.dev/hexa-cold-calling/hexa-cold-calling/backend:${{ github.sha }}
          gcloud run deploy hexa-cold-calling-backend \
            --image $IMAGE \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --no-invoker-iam-check \
            --update-env-vars "^||^SUPABASE_URL=${{ secrets.SUPABASE_URL }}||SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}||OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}||EXA_API_KEY=${{ secrets.EXA_API_KEY }}||TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}||TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}||TWILIO_PHONE_NUMBER=${{ secrets.TWILIO_PHONE_NUMBER }}||TWILIO_TWIML_APP_SID=${{ secrets.TWILIO_TWIML_APP_SID }}||TWILIO_API_KEY_SID=${{ secrets.TWILIO_API_KEY_SID }}||TWILIO_API_KEY_SECRET=${{ secrets.TWILIO_API_KEY_SECRET }}||APOLLO_API_KEY=${{ secrets.APOLLO_API_KEY }}||GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}||GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}||BACKEND_PUBLIC_URL=${{ vars.BACKEND_PUBLIC_URL }}||FRONTEND_URL=${{ vars.FRONTEND_URL }}||ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}"
